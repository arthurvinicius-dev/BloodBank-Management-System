{%load static%}
<!DOCTYPE html>
<html lang="en">
<head>
	<title>Enter Otp</title>
	<link rel="stylesheet" type="text/css" href="{% static '/style.css' %}">
</head>
<body>
	<div style="text-align:center;">
		{%include "header.html" %}
		{% if msg %}
		{{ msg }}
		{% endif %}
		<div class="table5_text"><caption>One Time Password</caption></div>
		<div class="table5">
		<form action="../verify_otp/" method="POST">
			{% csrf_token %}
			<div class="table5_td"><label for="otp">Enter OTP : </label><input id="otp" type="text" name="otp" class="table5_input"><br></div>
			<input id="submit_btn" type="submit" name="s_otp" value="Submit" class="table5_button" aria-label="Submit form">
		</form>
		</div>
		{%include "footer.html"%}
	</div>
</body>
</html>
