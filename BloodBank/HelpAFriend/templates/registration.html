{%load static%}
<!DOCTYPE html>
<html lang="en">
<head>
	<title>Registration Page</title>
	<link rel="stylesheet" type="text/css" href="{% static '/style.css' %}">
</head>
<body>
	<div style="text-align:center;">
	{% include "header.html" %}
	<div class="table2_text"><caption>Registration</caption></div>	
	<form action="../submit/" method="POST">
		{% csrf_token %}
		<div class="table2">
		<div class="form-layout">
			<div class="form-row">
					<div class="form-cell table2_td"><label for="fname">Full Name : </label></div>
					<div class="form-cell"><input id="fname" type="text" name="fname" class="table2_input"></div>
			</div>
			<div class="form-row">
				<div class="form-cell table2_td"><label for="blood">Blood Group : </label></div>
				<div class="form-cell">
					<select id="blood" name="blood" class="table2_input">
						<option>Select</option>
						<option value="O+">O+</option>
						<option value="O-">O-</option>
						<option value="A+">A+</option>
						<option value="A-">A-</option>
						<option value="A1+">A1+</option>
						<option value="A1-">A1-</option>
						<option value="A1B+">A1B+</option>
						<option value="A1B-">A1B-</option>
						<option value="A2+">A2+</option>
						<option value="A2-">A2-</option>
						<option value="A2B+">A2B+</option>
						<option value="A2B-">A2B-</option>
						<option value="AB+">AB+</option>
						<option value="AB-">AB-</option>
						<option value="B+">B+</option>
						<option value="B-">B-</option>
					</select>
				</div>
			</div>
			<div class="form-row">
				<div class="form-cell table2_td"><label for="dob">DOB : </label></div>
				<div class="form-cell">
					<input id="dob" type="date" name="dob" class="table2_input">
				</div>
			</div>
			<div class="form-row">
				<div class="form-cell table2_td"><label for="mobileno">Mobile Number : </label></div>
				<div class="form-cell"><input id="mobileno" type="text" name="mobileno" class="table2_input"></div>
			</div>
			<div class="form-row">
				<div class="form-cell table2_td"><label for="country">Country : </label></div>
				<div class="form-cell">
					<input id="country" type="text" name="country" class="table2_input">
				</div>
			</div>
			<div class="form-row">
				<div class="form-cell table2_td"><label for="state">State : </label></div>
				<div class="form-cell">
					<input id="state" type="text" name="state" class="table2_input">
				</div>
			</div>
			<div class="form-row">
				<div class="form-cell table2_td"><label for="city">City : </label></div>
				<div class="form-cell">
					<input id="city" type="text" name="city" class="table2_input">
				</div>
			</div>
			<div class="form-row">
				<div class="form-cell table2_td"><label for="pincode">Pincode : </label></div>
				<div class="form-cell">
					<input id="pincode" type="text" name="pincode" maxlength="6" class="table2_input">
				</div>
			</div>

			<div class="form-row">
				<div class="form-cell table2_td"><label for="email">Email Id : </label></div>
				<div class="form-cell">
					<input id="email" type="email" name="email" class="table2_input">
				</div>
			</div>
			<div class="form-row">
				<div class="form-cell table2_td"><label for="password">Password : </label></div>
				<div class="form-cell">
					<input id="password" type="password" name="password" class="table2_input">
				</div>
			</div>
			<div class="form-row">
				<div class="form-cell table2_td"><label for="rpassword">Retype Password : </label></div>
				<div class="form-cell">
					<input id="rpassword" type="password" name="rpassword" class="table2_input">
				</div>
			</div>
			<div class="form-row">
				<div class="form-cell table2_td"><label for="availability">Please confirm your availability <br> to donate blood : </label></div>
				<div class="form-cell">
					<select id="availability" name="availability" class="table2_input">
						<option>Select</option>
						<option value="available">Available</option>
						<option value="unavailable">Unavailable</option>
					</select>
				</div>
			</div>
			<div class="form-row">
				<div class="form-cell">
					<input id="submit_btn" type="submit" value="Submit" class="table2_button" aria-label="Submit form">
				</div>
				<div class="form-cell">
					<input id="reset_btn" type="reset" value="Reset" class="table2_button" aria-label="Reset form">
				</div>
			</div>
		</div>
	</div>
	</form>
	</div>
	{% include "footer.html" %}
</body>
</html>
