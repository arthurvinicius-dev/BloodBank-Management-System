{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
	<title>BloodBank Profile</title>
	<link rel="stylesheet" type="text/css" href="{% static '/style.css' %}">
</head>
<body>
	{% include "header.html" %}
	<div style="text-align:center;">
		<form action="../update_bb_details/" method="POST">
			{% csrf_token %}

			{% if bd%}
			<table role="presentation" class="table10">
				{% if msg %}
			<strong>{{ msg }}</strong>
			{% endif %}
			<tr>
				<td class="table2_td">BloodBank Name :</td>
				<td>
					{{bd.name}}
				</td>
			</tr>
			<tr>
				<td class="table2_td"><label for="country">Country : </label></td>
				<td><input id="country" type="text" name="country" value={{ bd.country }} class="table2_input"></td>
			</tr>
			<tr>
				<td class="table2_td"><label for="state">State : </label></td>
				<td><input id="state" type="text" name="state" value={{ bd.state }} class="table2_input"></td>
			</tr>
			<tr>
				<td class="table2_td"><label for="city">City : </label></td>
				<td><input id="city" type="text" name="city" value={{ bd.city }} class="table2_input"></td>
			</tr>
			<tr>
				<td class="table2_td"><label for="pincode">Pincode : </label></td>
				<td><input id="pincode" type="text" name="pincode" maxlength="6" value={{ bd.pincode }} class="table2_input"></td>
			</tr>
			<tr>
				<td class="table2_td"><label for="contact_no">Contact No. : </label></td>
				<td><input id="contact_no" type="text" name="contact_no" value={{ bd.contact_no }} class="table2_input"></td>
			</tr>
			<tr>
				<td class="table2_td"><label for="email">E-mail :</label></td>
				<td><input id="email" type="text" name="email" value={{ bd.email }} class="table2_input"></td>
			</tr>
			<tr>
				<td class="table2_td">ISO Certified? :</td>
				<td><input id="iso_yes" type="radio" name="iso" value="Yes"><label for="iso_yes">YES</label>  <input id="iso_no" type="radio" name="iso" value="No"><label for="iso_no">NO</label> </td>
			</tr>
			<tr>
				<td><input id="submit_btn" type="submit" value="Submit" class="table2_button" aria-label="Submit form"></td>
				<td><input id="reset_btn" type="reset" name="Reset" class="table2_button" aria-label="Reset form"></td>
			</tr>
			</table>
		{% endif %}
		</form>
	</div>
	{%include 'footer.html'%}
</body>
</html>
