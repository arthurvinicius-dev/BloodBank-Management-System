{%load static%}
<!DOCTYPE html>
<html lang="en">
<head>
	<title>Enter Password</title>
	<link rel="stylesheet" type="text/css" href="{% static '/style.css' %}">
</head>
<body>
	<div style="text-align:center;">
		{%include "header.html" %}
		{% if msg %}
		{{ msg }}
		{% endif %}
		<div class="table6_text"><caption>Enter New Password</caption></div>
		<div class="table6">
		<form action="../update_password/" method="POST">
			{% csrf_token %}
			<div class="table6_td"><label for="new_password">New Password : </label><input id="new_password" type="password" name="new_password" class="table6_input"><br></div>
			<div class="table6_td"><label for="re_password">Reenter Password : </label><input id="re_password" type="password" name="re_password" class="table6_input"><br></div>
			<input id="submit_btn" type="submit" value="Save Password" class="table6_button" aria-label="Submit form">
		</form>
		</div>
		{%include "footer.html" %}
	</div>
</body>
</html>
